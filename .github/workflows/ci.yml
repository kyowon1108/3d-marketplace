name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: marketplace
          POSTGRES_PASSWORD: marketplace
          POSTGRES_DB: marketplace_test
        ports:
          - "5433:5432"
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: cd services/api && uv sync

      - name: Lint
        run: cd services/api && uv run ruff check app/

      - name: Test
        env:
          TEST_DATABASE_URL: postgresql://marketplace:marketplace@localhost:5433/marketplace_test
          DEV_AUTH_ENABLED: "true"
        run: cd services/api && uv run pytest tests/ -v --tb=short
